# Build & push vers GHCR (BuildKit dans le cluster) + commit GitOps sur kubernetes/ui-deployment.yaml
# Miroir de build-push.yml (worker), ciblant apps/ui — image séparée (squash-assistant-ui).
# Secret repo : BUILDKIT_HOST=tcp://buildkitd.cicd.svc.cluster.local:1234
name: Build and push (ui)

on:
  push:
    branches: [main]
    paths:
      - "apps/ui/**"
      - "packages/db/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-push-ui.yml"
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: OCI image → GHCR + GitOps deployment
    runs-on: arc-runner-squash-assistant
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérifier BUILDKIT_HOST
        run: |
          if [ -z "${{ secrets.BUILDKIT_HOST }}" ]; then
            echo "::error::Secret BUILDKIT_HOST manquant"
            exit 1
          fi

      - name: Tester TCP vers BuildKit
        shell: bash
        run: |
          set -euo pipefail
          EP="${{ secrets.BUILDKIT_HOST }}"
          if [[ "${EP}" =~ ^tcp://([^:/]+):([0-9]+)$ ]]; then
            H="${BASH_REMATCH[1]}"
            P="${BASH_REMATCH[2]}"
          else
            echo "::error::BUILDKIT_HOST doit être tcp://hôte:port"
            exit 1
          fi
          timeout 10 bash -c "echo >/dev/tcp/${H}/${P}" 2>/dev/null || { echo "::error::TCP KO vers ${H}:${P}"; exit 1; }

      - name: Nom d’image GHCR
        id: image
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/squash-assistant-ui" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ secrets.BUILDKIT_HOST }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/ui/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:main
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max

      # GitOps : sed -E + escape ERE en bash (pas Python) — voir docs/guides/guide-add-external-app-k3s.md § Choix technique.
      - name: GitOps — kubernetes/ui-deployment.yaml (tag = SHA)
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}:${{ github.sha }}
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          PKG="squash-assistant-ui"
          FILE="kubernetes/ui-deployment.yaml"
          if [[ ! -f "$FILE" ]]; then
            echo "::notice::Pas de $FILE — skip GitOps"
            exit 0
          fi
          escape_ere() {
            local s="$1" out="" i c len
            len=${#s}
            for ((i=0; i<len; i++)); do
              c="${s:i:1}"
              case "$c" in
                .|'['|']'|'('|')'|'*'|'+'|'?'|'{'|'}'|'^'|'$'|'|'|\\)
                  out+="\\$c"
                  ;;
                *)
                  out+="$c"
                  ;;
              esac
            done
            printf '%s' "$out"
          }
          O_ESC=$(escape_ere "$OWNER")
          P_ESC=$(escape_ere "$PKG")
          if ! grep -qE "^[[:space:]]*image:[[:space:]]*ghcr\\.io/${O_ESC}/${P_ESC}:[^[:space:]]+" "$FILE"; then
            echo "::error::Aucune ligne image: ghcr.io/${OWNER}/${PKG}: — vérifie kubernetes/ui-deployment.yaml"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${GITHUB_REF_NAME}"
          sed -i.bak -E "s|^([[:space:]]*image:)[[:space:]]*ghcr\\.io/${O_ESC}/${P_ESC}:[^[:space:]]*|\\1 ${IMAGE_REF}|" "$FILE"
          rm -f "${FILE}.bak"
          git add "$FILE"
          if git diff --staged --quiet; then
            echo "Déjà à jour"
            exit 0
          fi
          git commit -m "chore(ci): image ${IMAGE_REF}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"
