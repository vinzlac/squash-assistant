# Redis self-hosted dédié — checkpointer LangGraph + config par règle de réservation (BookingRule[]).
# Pas de HA, pas de mot de passe (accès ClusterIP interne uniquement, pas d'Ingress).
# Voir docs/plan/plan-squash-assistant-k3s.md (repo k3s-homelab), Partie B.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: squash-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: squash-assistant
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          # redis-stack-server (pas redis:7-alpine) : le checkpointer LangGraph.js
          # officiel (@langchain/langgraph-checkpoint-redis) utilise RedisJSON +
          # RediSearch (JSON.SET, FT.CREATE), absents d'un Redis standard.
          image: redis/redis-stack-server:latest
          env:
            - name: REDIS_ARGS
              value: "--appendonly yes"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: squash-assistant
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
