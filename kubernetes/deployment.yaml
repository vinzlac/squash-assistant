# Worker Node.js long-running (scheduler LangGraph interne). Expose désormais une petite
# API interne (port 8080, ClusterIP uniquement, jamais d'Ingress) pour le déclenchement
# manuel des étapes depuis apps/ui — voir apps/worker/src/http/server.ts.
# Voir docs/plan/plan-squash-assistant-k3s.md (repo k3s-homelab).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squash-assistant
  namespace: squash-assistant
  labels:
    app.kubernetes.io/name: squash-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squash-assistant
  template:
    metadata:
      labels:
        app: squash-assistant
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/vinzlac/squash-assistant:51db2f71a156674fbde9b0035383d65ce093d288
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: HUDDLE_BOT_MCP_URL
              value: "https://huddle-bot.code-advisors.site/api/mcp"
            - name: RESA_SQUASH_MCP_URL
              value: "https://resa-squash.vercel.app/api/mcp"
          envFrom:
            - secretRef:
                name: squash-assistant-huddle-bot
            - secretRef:
                name: squash-assistant-resa-squash
            - secretRef:
                name: squash-assistant-telegram-token
            - secretRef:
                name: squash-assistant-telegram-chat
            - secretRef:
                name: squash-assistant-redis-url
            - secretRef:
                name: squash-assistant-database-url
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: squash-assistant
  namespace: squash-assistant
spec:
  type: ClusterIP
  selector:
    app: squash-assistant
  ports:
    - port: 8080
      targetPort: 8080
