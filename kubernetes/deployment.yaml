# Adapté depuis la stack « custom » (templates/app-stacks/custom) : pas de serveur HTTP,
# worker Node.js long-running (scheduler LangGraph interne) — pas de port exposé, pas de
# probe httpGet. Voir docs/plan/plan-squash-assistant-k3s.md (repo k3s-homelab).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squash-assistant
  namespace: squash-assistant
  labels:
    app.kubernetes.io/name: squash-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squash-assistant
  template:
    metadata:
      labels:
        app: squash-assistant
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/vinzlac/squash-assistant:69ed8132935a6c7bac8a0212755c7a6185c69593
          imagePullPolicy: Always
          env:
            - name: HUDDLE_BOT_MCP_URL
              value: "https://huddle-bot.code-advisors.site/api/mcp"
            - name: RESA_SQUASH_MCP_URL
              value: "https://resa-squash.vercel.app/api/mcp"
          envFrom:
            - secretRef:
                name: squash-assistant-huddle-bot
            - secretRef:
                name: squash-assistant-resa-squash
            - secretRef:
                name: squash-assistant-telegram-token
            - secretRef:
                name: squash-assistant-telegram-chat
            - secretRef:
                name: squash-assistant-redis-url
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 15
            periodSeconds: 30
